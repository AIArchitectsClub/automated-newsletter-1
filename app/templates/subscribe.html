{% extends "base.html" %}
{% block title %}Subscribe{% endblock %}
{% block content %}
  <div class="text-center py-5">
    <h1 class="display-6 fw-bold mb-2">Stay in the loop</h1>
    <p class="text-secondary mb-4">Get our newsletter delivered straight to your inbox.</p>

    {% if subscribed %}
      <div class="alert alert-success d-inline-block">You're subscribed. Thanks!</div>
    {% else %}
      <form method="post" action="/subscribe" class="d-flex justify-content-center gap-2 flex-wrap">
        <input type="email" name="email" class="form-control w-auto" style="min-width: 260px;" placeholder="you@example.com" required>
        <button type="submit" class="btn btn-primary">Subscribe</button>
      </form>
    {% endif %}
  </div>
{% endblock %}
