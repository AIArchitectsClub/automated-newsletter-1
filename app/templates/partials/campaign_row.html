<div class="col" id="campaign-{{ campaign.id }}">
  <div class="card shadow-sm hover-lift h-100">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
        <h5 class="card-title mb-0">{{ campaign.subject }}</h5>
        <span class="badge text-bg-{{ 'success' if campaign.status == 'sent' else 'warning' }}">{{ campaign.status }}</span>
      </div>
      <p class="card-text text-secondary">{{ campaign.body }}</p>
    </div>
    {% if campaign.status != "sent" %}
      <div class="card-footer bg-transparent border-0 pt-0 pb-3 d-flex gap-2">
        <button
          class="btn btn-sm btn-primary"
          hx-post="/admin/campaigns/{{ campaign.id }}/send"
          hx-target="#campaign-{{ campaign.id }}"
          hx-swap="outerHTML"
          hx-confirm="Send this campaign to all active subscribers?"
        >Send now</button>
        <button
          class="btn btn-sm btn-outline-danger"
          hx-delete="/admin/campaigns/{{ campaign.id }}"
          hx-target="#campaign-{{ campaign.id }}"
          hx-swap="outerHTML"
          hx-confirm="Delete this draft?"
        >Delete</button>
      </div>
    {% endif %}
  </div>
</div>
