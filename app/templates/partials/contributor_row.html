<div class="card shadow-sm" id="contributor-{{ contributor.id }}">
  <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div>
      <div class="fw-semibold">{{ contributor.name }}</div>
      <div class="text-secondary small">
        {{ contributor.email }}{% if contributor.team %} &middot; {{ contributor.team }}{% endif %}
      </div>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="badge text-bg-{{ 'warning' if contributor.status == 'pending' else ('success' if contributor.status == 'approved' else 'danger') }}">
        {{ contributor.status }}
      </span>
      {% if contributor.status == 'pending' %}
        <button
          class="btn btn-sm btn-success"
          hx-post="/admin/contributors/{{ contributor.id }}/approve"
          hx-target="#contributor-{{ contributor.id }}"
          hx-swap="outerHTML"
        >Approve</button>
        <button
          class="btn btn-sm btn-outline-danger"
          hx-post="/admin/contributors/{{ contributor.id }}/deny"
          hx-target="#contributor-{{ contributor.id }}"
          hx-swap="outerHTML"
          hx-confirm="Deny this enrollment?"
        >Deny</button>
      {% endif %}
    </div>
  </div>
</div>
