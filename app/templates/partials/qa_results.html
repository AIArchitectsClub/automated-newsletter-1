{% if answer %}
  <div class="alert alert-success qa-answer">{{ answer }}</div>
{% endif %}

<div class="d-flex flex-column gap-3">
  {% for submission in matches %}
    {% include "partials/submission_row.html" %}
  {% else %}
    {% if asked %}
      <p class="text-secondary">No matching submissions found — try asking something else.</p>
    {% endif %}
  {% endfor %}
</div>
