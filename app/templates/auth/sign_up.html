{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
  <div class="card shadow-sm p-4 mx-auto" style="max-width: 380px;">
    <h1 class="h4 fw-bold mb-3 text-center">Create admin account</h1>
    <form method="post" action="/auth/sign-up">
      {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
      <div class="mb-3">
        <input type="text" name="name" class="form-control" placeholder="Name" required>
      </div>
      <div class="mb-3">
        <input type="email" name="email" class="form-control" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <input type="password" name="password" class="form-control" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign up</button>
    </form>
    <p class="text-center text-secondary small mt-3 mb-0">Already have an account? <a href="/auth/sign-in">Sign in</a></p>
  </div>
{% endblock %}
