<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Newsletter{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v={{ style_version }}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container-fluid px-4" style="max-width: 960px; margin: 0 auto;">
      <a href="/subscribe" class="navbar-brand fw-bold">📰 Newsletter</a>
      <div class="d-flex align-items-center gap-3 flex-wrap">
        <a href="/contribute" class="nav-link">Contribute</a>
        {% if current_user %}
          <a href="/admin/subscribers" class="nav-link">Subscribers</a>
          <a href="/admin/campaigns" class="nav-link">Campaigns</a>
          <a href="/admin/submissions" class="nav-link">Submissions</a>
          <a href="/admin/ask" class="nav-link">Ask</a>
          <form action="/auth/sign-out" method="post" class="mb-0">
            <button type="submit" class="btn btn-sm btn-outline-secondary">Sign out ({{ current_user.name }})</button>
          </form>
        {% else %}
          <a href="/auth/sign-in" class="btn btn-sm btn-primary">Admin sign in</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="container py-4" style="max-width: 960px;">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
