{% extends "base.html" %}
{% block title %}Ask{% endblock %}
{% block content %}
  <h1>Ask about the newsletter</h1>
  <p class="lede">
    Ask a question and get an answer generated from the closest matching
    submissions below it.
  </p>

  <input
    type="search"
    name="q"
    placeholder="What do you want to know?"
    class="search-box"
    hx-get="/admin/ask/answer"
    hx-trigger="keyup changed delay:400ms, search"
    hx-target="#qa-results"
    hx-swap="innerHTML"
  >

  <div id="qa-results">
    {% include "partials/qa_results.html" %}
  </div>
{% endblock %}
