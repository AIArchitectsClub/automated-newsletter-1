{% extends "base.html" %}
{% block title %}Contributor sign in{% endblock %}
{% block content %}
  <div class="card shadow-sm p-4 mx-auto" style="max-width: 380px;">
    <h1 class="h4 fw-bold mb-3 text-center">Contributor sign in</h1>
    <form method="post" action="/contributor/sign-in">
      {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-3">
        <input type="email" name="email" class="form-control" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <input type="password" name="password" class="form-control" placeholder="Password" required>
      </div>
      <button type="submit" class="btn contribute-submit-btn w-100">Sign in</button>
    </form>
    <p class="text-center text-secondary small mt-3 mb-0">New contributor? <a href="/enroll">Enroll here</a></p>
  </div>
{% endblock %}
